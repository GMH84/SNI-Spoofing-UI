name: Compile Standalone Release Binaries

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build Standalone Executable
    runs-on: windows-latest
    permissions:
      contents: write
    strategy:
      matrix:
        architecture: [x64, x86]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          architecture: ${{ matrix.architecture }}

      - name: Install Project Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pydivert pywebview flask pyinstaller

      - name: Build Standalone Executable with PyInstaller
        run: |
          pyinstaller --noconfirm --onefile --windowed --uac-admin --add-data "index.html;." --name "SNI-Spoofing-UI-${{ matrix.architecture }}" main.py

      - name: Upload Binary Assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/SNI-Spoofing-UI-${{ matrix.architecture }}.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
